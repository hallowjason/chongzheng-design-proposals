<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提案 C — Stripe Premium 風格｜Layer 1-3 完整設計系統</title>
<style>
/* ============================================================
   PROPOSAL C: Stripe-Inspired Premium Enterprise
   Layer 1: Design Tokens | Layer 2: Component System | Layer 3: Responsive Layout
   精緻財金感 × 藍灰主調 × 表格數據最優 × 完整語義 Token
   ============================================================ */

/* ── Primitive Tokens (color primitives, never reference directly in components) ── */
:root {
  --hds-primitive-navy-900: #0f1624;
  --hds-primitive-navy-800: #1a1f2e;
  --hds-primitive-navy-700: #252c3e;
  --hds-primitive-navy-600: #2f3750;
  --hds-primitive-navy-500: #3e4d6a;
  --hds-primitive-teal-400: #54d1c6;
  --hds-primitive-teal-500: #3aada3;
  --hds-primitive-teal-600: #2d9089;
  --hds-primitive-teal-700: #227570;
  --hds-primitive-teal-800: #1a5c58;
  --hds-primitive-cream: #f5e1c6;
  --hds-primitive-warm-400: #f8a57f;
  --hds-primitive-warm-500: #e07a50;
  --hds-primitive-warm-600: #c8643a;
  --hds-primitive-white: #ffffff;
  --hds-primitive-gray-50: #f8f9fc;
  --hds-primitive-gray-100: #f0f2f7;
  --hds-primitive-gray-200: #e8ecf3;
  --hds-primitive-gray-300: #e5edf5;
  --hds-primitive-gray-400: #d0dae8;
  --hds-primitive-gray-500: #b8c8da;
  --hds-primitive-gray-600: #94a3b8;
  --hds-primitive-gray-700: #64748d;
  --hds-primitive-gray-800: #3a4660;
  --hds-primitive-gray-900: #0d1f3a;
  --hds-primitive-blue-700: #1d4ed8;
  --hds-primitive-pink-800: #9d174d;
  --hds-primitive-green-500: #15be53;
  --hds-primitive-green-800: #108c3d;
  --hds-primitive-amber-400: #f59e0b;
  --hds-primitive-amber-900: #92400e;
  --hds-primitive-red-500: #ef4444;
  --hds-primitive-red-800: #991b1b;
  --hds-primitive-blue-500: #3b82f6;
  --hds-primitive-blue-800: #1d4ed8;
  --hds-primitive-violet-500: #8b5cf6;
  --hds-primitive-violet-800: #5b21b6;
  --hds-primitive-shadow-blue: rgba(50,50,93,1);
  --hds-primitive-shadow-black: rgba(0,0,0,1);
  --hds-primitive-teal-glow: rgba(58,173,163,1);
  --hds-primitive-warm-glow: rgba(224,122,80,1);

  /* === Surface Colors === */
  --hds-color-bg: var(--hds-primitive-white);
  --hds-color-bg-offset: var(--hds-primitive-gray-50);
  --hds-color-bg-subtle: var(--hds-primitive-gray-100);
  --hds-color-bg-muted: var(--hds-primitive-gray-200);

  /* === Sidebar === */
  --hds-sidebar-bg: var(--hds-primitive-navy-800);
  --hds-sidebar-bg-hover: var(--hds-primitive-navy-700);
  --hds-sidebar-bg-active: var(--hds-primitive-navy-600);
  --hds-sidebar-border: rgba(255,255,255,0.07);
  --hds-sidebar-text: #c8d0e4;
  --hds-sidebar-text-muted: var(--hds-primitive-navy-500);
  --hds-sidebar-accent: var(--hds-primitive-teal-400);

  /* === Text Colors === */
  --hds-color-heading: var(--hds-primitive-gray-900);
  --hds-color-body: var(--hds-primitive-gray-800);
  --hds-color-secondary: var(--hds-primitive-gray-700);
  --hds-color-tertiary: var(--hds-primitive-gray-600);
  --hds-color-placeholder: var(--hds-primitive-gray-500);
  --hds-color-on-dark: #e8edf8;

  /* === Brand Accent — 道場品牌映射 === */
  --hds-color-primary: var(--hds-primitive-teal-500);
  --hds-color-primary-hover: var(--hds-primitive-teal-600);
  --hds-color-primary-active: var(--hds-primitive-teal-700);
  --hds-color-primary-light: #e6fafa;
  --hds-color-primary-border: rgba(58, 173, 163, 0.3);

  /* 現有橘 #f8a57f → 強調/暖色 */
  --hds-color-warm: var(--hds-primitive-warm-500);
  --hds-color-warm-light: #fef4ee;
  --hds-color-warm-border: rgba(224, 122, 80, 0.25);

  /* 現有米色 #f5e1c6 → 背景素材 */
  --hds-color-cream: var(--hds-primitive-cream);
  --hds-color-cream-bg: #fdf8f2;

  /* === Status === */
  --hds-color-success: var(--hds-primitive-green-500);
  --hds-color-success-bg: rgba(21, 190, 83, 0.1);
  --hds-color-success-text: var(--hds-primitive-green-800);
  --hds-color-warning: var(--hds-primitive-amber-400);
  --hds-color-warning-bg: rgba(245, 158, 11, 0.1);
  --hds-color-warning-text: var(--hds-primitive-amber-900);
  --hds-color-error: var(--hds-primitive-red-500);
  --hds-color-error-bg: rgba(239, 68, 68, 0.1);
  --hds-color-error-text: var(--hds-primitive-red-800);
  --hds-color-info: var(--hds-primitive-blue-500);
  --hds-color-info-bg: rgba(59, 130, 246, 0.08);
  --hds-color-info-text: var(--hds-primitive-blue-800);
  --hds-color-new: var(--hds-primitive-violet-500);
  --hds-color-new-bg: rgba(139, 92, 246, 0.1);
  --hds-color-new-text: var(--hds-primitive-violet-800);

  /* === Border === */
  --hds-color-border: var(--hds-primitive-gray-300);
  --hds-color-border-medium: var(--hds-primitive-gray-400);
  --hds-color-border-strong: var(--hds-primitive-gray-500);
  --hds-color-border-focus: var(--hds-color-primary);

  /* === Shadow — Stripe blue-tinted === */
  --hds-shadow-xs: 0px 1px 3px rgba(50,50,93,0.04), 0px 1px 2px rgba(0,0,0,0.04);
  --hds-shadow-sm: 0px 2px 8px rgba(50,50,93,0.1), 0px 1px 3px rgba(0,0,0,0.07);
  --hds-shadow-md: 0px 4px 16px rgba(50,50,93,0.18), 0px 2px 6px rgba(0,0,0,0.1);
  --hds-shadow-focus: 0 0 0 4px rgba(58,173,163,0.2);
  --hds-shadow-footer: 0 -4px 16px rgba(50,50,93,0.08);

  /* === Gender colors === */
  --hds-color-gender-m: var(--hds-primitive-blue-700);
  --hds-color-gender-f: var(--hds-primitive-pink-800);

  /* === Meal tag === */
  --hds-color-meal-text: #7d4826;
  --hds-color-meal-border: rgba(245,225,198,0.8);

  /* === Typography === */
  --font-display: -apple-system, 'PingFang TC', 'Noto Sans TC', 'Hiragino Kaku Gothic Pro', sans-serif;
  --font-body: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Mono', 'Courier New', monospace;

  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 15px;
  --text-md: 17px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 28px;

  /* === Spacing (8px base) === */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;

  /* === Layout === */
  --sidebar-w: 232px;
  --sidebar-w-collapsed: 64px;
  --header-h: 56px;

  /* === Radius === */
  --radius-xs: 3px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 9999px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--hds-color-body);
  background: var(--hds-color-bg-offset);
  min-height: 100vh;
  line-height: 1.55;
}

/* ── Focus visible ── */
:focus-visible {
  outline: 2px solid var(--hds-color-primary);
  outline-offset: 2px;
}

/* ── Header ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--hds-primitive-navy-800);
  border-bottom: 1px solid var(--hds-sidebar-border);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-6);
  z-index: 200;
  box-shadow: var(--hds-shadow-sm);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  width: var(--sidebar-w);
  flex-shrink: 0;
}
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--hds-primitive-teal-500) 0%, var(--hds-primitive-teal-800) 100%);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(58,173,163,0.4);
}
.logo-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--hds-color-on-dark);
  letter-spacing: 0.03em;
  line-height: 1.2;
}
.logo-sub {
  font-size: 10px;
  color: var(--hds-sidebar-text-muted);
  letter-spacing: 0.06em;
  font-weight: 400;
}
.header-sep {
  width: 1px; height: 24px;
  background: var(--hds-sidebar-border);
  margin: 0 var(--sp-5);
}
.header-nav {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  flex: 1;
}
.h-nav-item {
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--text-sm);
  color: var(--hds-sidebar-text);
  border-radius: var(--radius-sm);
  text-decoration: none;
  transition: background 0.12s, color 0.12s;
  opacity: 0.7;
  cursor: pointer;
  font-weight: 400;
}
.h-nav-item:hover { background: var(--hds-sidebar-bg-hover); opacity: 1; }
.h-nav-item--active {
  background: var(--hds-sidebar-bg-active);
  color: var(--hds-primitive-white);
  opacity: 1;
  font-weight: 500;
}
.header-right {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}
.notif-btn {
  width: 32px; height: 32px;
  background: var(--hds-sidebar-bg-hover);
  border: 1px solid var(--hds-sidebar-border);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  cursor: pointer;
  position: relative;
  color: var(--hds-sidebar-text);
  transition: background 0.12s;
}
.notif-btn:hover { background: var(--hds-sidebar-bg-active); }
.notif-badge {
  position: absolute;
  top: -3px; right: -3px;
  width: var(--sp-2); height: var(--sp-2);
  border-radius: var(--radius-pill);
  background: var(--hds-color-warm);
  border: 1.5px solid var(--hds-primitive-navy-800);
}
.user-chip {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-1) var(--sp-2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  background: transparent;
  border: none;
  font-family: var(--font-body);
}
.user-chip:hover { background: var(--hds-sidebar-bg-hover); }
.avatar {
  width: 28px; height: 28px;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--hds-primitive-teal-500) 0%, var(--hds-primitive-teal-700) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--hds-primitive-white);
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(58,173,163,0.4);
}
.user-name {
  font-size: var(--text-sm);
  color: var(--hds-sidebar-text);
  font-weight: 500;
}

/* ── Shell ── */
.shell {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--hds-primitive-navy-800);
  flex-shrink: 0;
  position: fixed;
  top: var(--header-h); bottom: 0; left: 0;
  overflow-y: auto;
  z-index: 100;
  border-right: 1px solid var(--hds-sidebar-border);
  padding: var(--sp-4) var(--sp-2) var(--sp-12);
  transition: width 0.2s ease;
}
.sb-group {
  margin-bottom: var(--sp-5);
}
.sb-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--hds-sidebar-text-muted);
  padding: var(--sp-2) var(--sp-3);
  margin-bottom: var(--sp-1);
  white-space: nowrap;
  overflow: hidden;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  color: var(--hds-sidebar-text);
  font-size: 13px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  margin: 1px 0;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
}
.sb-item:hover { background: var(--hds-sidebar-bg-hover); }
.sb-item--active {
  background: var(--hds-sidebar-bg-active);
  color: #e8edf8;
  font-weight: 500;
}
.sb-item--active .sb-icon { color: var(--hds-sidebar-accent); }
.sb-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  color: var(--hds-sidebar-text-muted);
}
.sb-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255,255,255,0.08);
  color: var(--hds-sidebar-text);
  padding: 2px var(--sp-2);
  border-radius: var(--radius-pill);
}
.sb-count--warm {
  background: var(--hds-color-warm);
  color: var(--hds-primitive-white);
}
/* Sidebar collapsed: icon-only text hidden */
.sb-item-text { flex: 1; overflow: hidden; }

/* ── Main ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  background: var(--hds-color-bg-offset);
  min-height: calc(100vh - var(--header-h));
  transition: margin-left 0.2s ease;
}

/* ── Page Header ── */
.page-header {
  background: var(--hds-color-bg);
  border-bottom: 1px solid var(--hds-color-border);
  padding: var(--sp-5) var(--sp-8) var(--sp-6);
  box-shadow: var(--hds-shadow-xs);
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: var(--text-xs);
  color: var(--hds-color-tertiary);
  margin-bottom: var(--sp-4);
  letter-spacing: 0.02em;
}
.bc-link {
  color: var(--hds-color-primary);
  text-decoration: none;
  transition: color 0.1s;
}
.bc-link:hover { color: var(--hds-color-primary-hover); text-decoration: underline; }
.bc-sep { color: var(--hds-color-border-medium); }
.ph-body {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.page-title {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--hds-color-heading);
  letter-spacing: -0.5px;
  line-height: 1.15;
  text-wrap: balance;
}
.page-desc {
  font-size: var(--text-sm);
  color: var(--hds-color-secondary);
  margin-top: var(--sp-2);
  display: flex;
  align-items: center;
  gap: var(--sp-4);
}
.desc-tag {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 3px var(--sp-3);
  border-radius: var(--radius-pill);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.04em;
  background: var(--hds-color-primary-light);
  color: var(--hds-color-primary-active);
  border: 1px solid var(--hds-color-primary-border);
}
.desc-tag-warm {
  background: var(--hds-color-warm-light);
  color: var(--hds-color-warm);
  border-color: var(--hds-color-warm-border);
}

/* ── Content ── */
.content {
  padding: var(--sp-6) var(--sp-8);
}

/* ── Panel Card ── */
.panel {
  background: var(--hds-color-bg);
  border: 1px solid var(--hds-color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--hds-shadow-xs);
  overflow: hidden;
  margin-bottom: var(--sp-5);
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) var(--sp-6);
  border-bottom: 1px solid var(--hds-color-border);
  background: var(--hds-color-bg-offset);
}
.panel-title {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--hds-color-heading);
  letter-spacing: 0.01em;
}
.panel-body {
  padding: var(--sp-5) var(--sp-6);
}

/* ── Search ── */
.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: var(--sp-4);
  align-items: end;
}
.field-group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
}
.field-label {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--hds-color-secondary);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.field-input, .field-select {
  height: 38px;
  border: 1px solid var(--hds-color-border-medium);
  background: var(--hds-color-bg-subtle);
  padding: 0 var(--sp-3);
  font-size: var(--text-sm);
  font-family: var(--font-body);
  color: var(--hds-color-body);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--hds-shadow-xs);
}
.field-input:focus, .field-select:focus {
  border-color: var(--hds-color-border-focus);
  box-shadow: var(--hds-shadow-focus);
  background: var(--hds-color-bg);
}
.field-input::placeholder { color: var(--hds-color-placeholder); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  height: 38px;
  padding: 0 var(--sp-4);
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-body);
  border: none;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.12s;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(0.97); }
.btn--primary {
  background: var(--hds-primitive-navy-900);
  color: var(--hds-primitive-white);
  box-shadow: var(--hds-shadow-sm);
}
.btn--primary:hover {
  background: var(--hds-primitive-navy-800);
  box-shadow: 0px 4px 12px rgba(50,50,93,0.15), 0px 2px 6px rgba(0,0,0,0.1);
  transform: translateY(-1px);
}
.btn--secondary {
  background: var(--hds-color-bg);
  color: var(--hds-primitive-navy-800);
  border: 1.5px solid var(--hds-primitive-navy-800);
  box-shadow: var(--hds-shadow-xs);
}
.btn--secondary:hover {
  background: var(--hds-primitive-gray-50);
  box-shadow: var(--hds-shadow-sm);
  transform: translateY(-1px);
}
.btn--teal {
  background: var(--hds-primitive-teal-800);
  color: var(--hds-primitive-white);
  box-shadow: 0px 2px 8px rgba(26,92,88,0.3);
}
.btn--teal:hover {
  background: var(--hds-primitive-teal-700);
  transform: translateY(-1px);
  box-shadow: 0px 4px 12px rgba(26,92,88,0.4);
}
.btn--danger {
  background: #7f1d1d;
  color: var(--hds-primitive-white);
  box-shadow: 0px 2px 8px rgba(127,29,29,0.3);
}
.btn--danger:hover {
  background: #991b1b;
  transform: translateY(-1px);
}
.btn--disabled, .btn:disabled {
  background: var(--hds-color-bg-subtle);
  color: var(--hds-color-placeholder);
  border: 1px solid var(--hds-color-border);
  cursor: not-allowed;
  box-shadow: none;
  pointer-events: none;
}
.btn--confirm {
  background: linear-gradient(135deg, var(--hds-primitive-warm-500) 0%, var(--hds-primitive-warm-600) 100%);
  color: var(--hds-primitive-white);
  box-shadow: 0px 4px 12px rgba(224,122,80,0.35);
}
.btn--confirm:hover {
  filter: brightness(1.07);
  transform: translateY(-1px);
  box-shadow: 0px 6px 16px rgba(224,122,80,0.45);
}
.btn--outline {
  background: var(--hds-color-bg);
  color: var(--hds-color-body);
  border: 1px solid var(--hds-color-border-medium);
  box-shadow: var(--hds-shadow-xs);
}
.btn--outline:hover { background: var(--hds-color-bg-subtle); border-color: var(--hds-color-border-strong); }
.btn--ghost {
  background: transparent;
  color: var(--hds-color-secondary);
  border: 1px solid transparent;
}
.btn--ghost:hover { background: var(--hds-color-bg-subtle); }
.btn--sm {
  height: 30px;
  padding: 0 var(--sp-3);
  font-size: var(--text-xs);
  border-radius: var(--radius-xs);
}
.btn--lg {
  height: 44px;
  padding: 0 var(--sp-6);
  font-size: var(--text-base);
  border-radius: var(--radius-md);
}

/* ── Result Bar ── */
.result-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: var(--sp-5) 0 var(--sp-3);
}
.result-text {
  font-size: var(--text-sm);
  color: var(--hds-color-secondary);
}
.result-text strong { color: var(--hds-color-heading); font-weight: 700; }
.result-controls { display: flex; gap: var(--sp-2); }

/* ── Table ── */
.table-wrapper {
  background: var(--hds-color-bg);
  border: 1px solid var(--hds-color-border);
  border-radius: var(--radius-lg);
  overflow-x: auto;
  box-shadow: var(--hds-shadow-xs);
  margin-bottom: var(--sp-5);
}
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
}
.tbl thead {
  background: var(--hds-color-bg-offset);
  border-bottom: 1px solid var(--hds-color-border);
}
.tbl th {
  padding: var(--sp-3) var(--sp-4);
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--hds-color-secondary);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  white-space: nowrap;
}
.tbl th.c, .tbl td.c { text-align: center; }
.tbl td {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--hds-color-border);
  vertical-align: middle;
  color: var(--hds-color-body);
  white-space: nowrap;
}
.tbl tbody tr {
  transition: background 0.1s;
}
.tbl tbody tr:hover td { background: var(--hds-color-bg-subtle); }
.tbl tbody tr.selected td { background: var(--hds-color-primary-light); }
.tbl tbody tr.tbl-row--selected-demo td {
  background: var(--hds-color-primary-light);
  border-left: 3px solid var(--hds-primitive-navy-800);
}
.tbl tbody tr:last-child td { border-bottom: none; }

/* Sticky columns */
.tbl th.sticky-check,
.tbl td.sticky-check {
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 1;
}
.tbl thead .sticky-check { background: var(--hds-color-bg-offset); }
.tbl tbody tr:hover .sticky-check { background: var(--hds-color-bg-offset); }
.tbl tbody tr.selected .sticky-check { background: var(--hds-color-primary-light); }
.tbl tbody tr:last-child .sticky-check { border-bottom: none; }

.tbl th.sticky-name,
.tbl td.sticky-name {
  position: sticky;
  left: 36px;
  background: inherit;
  z-index: 1;
}
.tbl thead .sticky-name { background: var(--hds-color-bg-offset); }
.tbl tbody tr:hover .sticky-name { background: var(--hds-color-bg-offset); }
.tbl tbody tr.selected .sticky-name { background: var(--hds-color-primary-light); }
.tbl tbody tr:last-child .sticky-name { border-bottom: none; }

/* Checkbox */
.chk {
  width: 15px; height: 15px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  accent-color: var(--hds-color-primary);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 2px var(--sp-2);
  border-radius: var(--radius-pill);
  font-size: var(--text-xs);
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: 0.03em;
  border: 1px solid transparent;
}
.badge-dot {
  width: var(--sp-1); height: var(--sp-1);
  border-radius: var(--radius-pill);
  flex-shrink: 0;
}
.badge--success {
  background: var(--hds-color-success-bg);
  color: var(--hds-color-success-text);
  border-color: rgba(21,190,83,0.2);
}
.badge--success .badge-dot { background: var(--hds-color-success); }
.badge--warning {
  background: var(--hds-color-warning-bg);
  color: var(--hds-color-warning-text);
  border-color: rgba(245,158,11,0.2);
}
.badge--warning .badge-dot { background: var(--hds-color-warning); }
.badge--new {
  background: var(--hds-color-new-bg);
  color: var(--hds-color-new-text);
  border-color: rgba(139,92,246,0.2);
}
.badge--new .badge-dot { background: var(--hds-color-new); }
.badge--error {
  background: var(--hds-color-error-bg);
  color: var(--hds-color-error-text);
  border-color: rgba(239,68,68,0.2);
}
.badge--error .badge-dot { background: var(--hds-color-error); }
.badge--info {
  background: var(--hds-color-info-bg);
  color: var(--hds-color-info-text);
  border-color: rgba(59,130,246,0.2);
}
.badge--info .badge-dot { background: var(--hds-color-info); }
.badge--neutral {
  background: var(--hds-color-bg-subtle);
  color: var(--hds-color-secondary);
  border-color: var(--hds-color-border);
}
.badge--neutral .badge-dot { background: var(--hds-color-placeholder); }
.badge--warm {
  background: var(--hds-color-warm-light);
  color: var(--hds-color-warm);
  border-color: var(--hds-color-warm-border);
}
.badge--warm .badge-dot { background: var(--hds-color-warm); }

/* Meal tags */
.meal-wrap { display: flex; gap: 3px; flex-wrap: wrap; }
.meal-tag {
  padding: 1px var(--sp-2);
  font-size: var(--text-xs);
  font-weight: 600;
  border-radius: var(--radius-xs);
  background: var(--hds-color-cream-bg);
  color: var(--hds-color-meal-text);
  border: 1px solid var(--hds-color-meal-border);
  letter-spacing: 0.02em;
}

/* Gender */
.g-m { color: var(--hds-color-gender-m); font-weight: 700; }
.g-f { color: var(--hds-color-gender-f); font-weight: 700; }

/* Clean */
.c-yes { color: var(--hds-color-success); font-weight: 700; }
.c-no { color: var(--hds-color-tertiary); }

/* Seq number */
.seq {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--hds-color-tertiary);
  font-weight: 600;
}

/* Name link */
.name-link {
  font-weight: 600;
  color: var(--hds-color-heading);
  cursor: pointer;
  transition: color 0.1s;
}
.name-link:hover { color: var(--hds-color-primary); }

/* ── Stats Strip ── */
.stats-strip {
  display: flex;
  gap: var(--sp-4);
  margin-bottom: var(--sp-5);
}
.stat-card {
  flex: 1;
  background: var(--hds-primitive-navy-800);
  border: 1px solid var(--hds-primitive-navy-600);
  border-left: 3px solid var(--hds-color-primary);
  border-radius: var(--radius-md);
  padding: var(--sp-4) var(--sp-5);
  box-shadow: var(--hds-shadow-sm);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(58,173,163,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.stat-card--selected { border-left-color: var(--hds-primitive-teal-400); }
.stat-card--clean { border-left-color: var(--hds-color-success); }
.stat-card--meal { border-left-color: var(--hds-color-warm); }
.stat-card--lodging { border-left-color: var(--hds-color-warning); }
.stat-label {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--hds-sidebar-text);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--sp-1);
  display: flex;
  align-items: center;
  gap: var(--sp-1);
}
.stat-value {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--hds-primitive-white);
  font-variant-numeric: tabular-nums;
  font-family: var(--font-mono);
  line-height: 1.1;
}
.stat-sub {
  font-size: var(--text-xs);
  color: var(--hds-sidebar-text-muted);
  margin-top: 2px;
}
.stat-indicator {
  display: inline-block;
  width: var(--sp-2); height: var(--sp-2);
  border-radius: var(--radius-pill);
}

/* ── Footer ── */
.footer {
  position: sticky;
  bottom: 0;
  background: var(--hds-color-bg);
  border-top: 1px solid var(--hds-color-border);
  padding: var(--sp-4) var(--sp-8);
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--hds-shadow-footer);
  z-index: 50;
}
.footer-hint {
  font-size: var(--text-sm);
  color: var(--hds-color-secondary);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}
.footer-hint-strong {
  color: var(--hds-color-heading);
  font-weight: 700;
  margin: 0 var(--sp-1);
}
.footer-hint-icon {
  width: 18px; height: 18px;
  border-radius: var(--radius-pill);
  background: var(--hds-color-info-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--hds-color-info);
  font-weight: 700;
}
.footer-btns { display: flex; gap: var(--sp-3); align-items: center; }

<!-- ── Tooltip System (Proposal C style: dark navy + teal border) ── -->
<script>
(function() {
  var tooltip = document.createElement('div');
  tooltip.id = 'design-tooltip';
  tooltip.style.cssText = [
    'position:fixed',
    'bottom:24px',
    'right:24px',
    'max-width:320px',
    'padding:14px 16px',
    'background:#1a1f2e',
    'color:#c8d0e4',
    'border-radius:10px',
    'font-size:13px',
    'line-height:1.55',
    'border-left:3px solid #3aada3',
    'box-shadow:0 4px 24px rgba(15,22,36,0.4)',
    'opacity:0',
    'transition:opacity 0.2s ease',
    'pointer-events:none',
    'z-index:9999',
    'font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif'
  ].join(';');
  document.body.appendChild(tooltip);

  var timer;
  document.addEventListener('mouseover', function(e) {
    var target = e.target.closest('[data-note]');
    clearTimeout(timer);
    if (target) {
      timer = setTimeout(function() {
        var layer = target.dataset.layer || '';
        tooltip.innerHTML = (layer
          ? '<div style="font-size:11px;color:#3aada3;margin-bottom:4px;font-family:\'SF Mono\',\'Cascadia Mono\',monospace;letter-spacing:0.06em">' + layer + '</div>'
          : '') + target.dataset.note;
        tooltip.style.opacity = '1';
      }, 180);
    } else {
      tooltip.style.opacity = '0';
    }
  });

  document.addEventListener('mouseleave', function() {
    clearTimeout(timer);
    tooltip.style.opacity = '0';
  });
})();

// ── Hamburger toggle ──
(function() {
  var btn = document.getElementById('hamburger');
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebar-overlay');

  function open() {
    sidebar.classList.add('is-open');
    overlay.classList.add('is-visible');
    btn.setAttribute('aria-expanded', 'true');
  }
  function close() {
    sidebar.classList.remove('is-open');
    overlay.classList.remove('is-visible');
    btn.setAttribute('aria-expanded', 'false');
  }

  btn.addEventListener('click', function() {
    if (sidebar.classList.contains('is-open')) { close(); } else { open(); }
  });
  overlay.addEventListener('click', close);
})();
</script>
